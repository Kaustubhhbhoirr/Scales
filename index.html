<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scales — Mermaid to PNG</title>
<link rel="icon" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:   #E4DED2;   /* warm greige — softer than bone, easier on the eye */
    --surface: #EFEAE0;   /* panels */
    --ink:     #232019;
    --muted:   #7B7365;
    --line:    #D2C9B9;   /* hairline */
    --accent:  #9E4B31;   /* deep clay */
    --accent-soft: #E6D8CE;
    --serif: "Instrument Serif", Georgia, "Times New Roman", serif;
    --sans: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    --mono: "JetBrains Mono", ui-monospace, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--paper); color: var(--ink);
    font-family: var(--sans); font-size: 14px;
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  }
  button, select, input { font-family: inherit; }

  .eyebrow {
    font-size: 10px; letter-spacing: .16em; text-transform: uppercase;
    color: var(--muted); font-weight: 500;
  }

  /* ---------- Top bar ---------- */
  header {
    display: flex; align-items: center; gap: 18px;
    padding: 12px 22px; border-bottom: 1px solid var(--line); background: var(--surface);
  }
  .wordmark { font-family: var(--serif); font-size: 30px; line-height: 1; letter-spacing: .01em; }
  /* The logo art sits in a lot of its own padding, so it is scaled up inside
     a clipped badge to make the shell fill the mark. */
  .logo-badge {
    width: 38px; height: 38px; flex: none; overflow: hidden; border-radius: 7px;
    background: #EAE4D8; border: 1px solid var(--line); display: grid; place-items: center;
  }
  .logo-badge img { width: 100%; height: 100%; object-fit: cover; transform: scale(1.6); display: block; }
  header .spacer { flex: 1; }
  .stamp {
    font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--accent);
    border: 1px solid var(--accent); border-radius: 2px; padding: 6px 12px; background: transparent;
  }

  /* ---------- Body grid ---------- */
  main { flex: 1; display: flex; min-height: 0; }

  /* Sidebar */
  aside {
    flex: 0 0 196px; border-right: 1px solid var(--line); background: var(--surface);
    display: flex; flex-direction: column; padding: 22px 18px;
  }
  .project-title {
    font-family: var(--serif); font-size: 26px; line-height: 1.15; margin: 8px 0 22px;
  }
  .btn-solid {
    display: block; width: 100%; background: var(--ink); color: var(--paper);
    border: 0; border-radius: 2px; padding: 13px 14px; cursor: pointer;
    font-size: 11px; letter-spacing: .14em; text-transform: uppercase; font-weight: 500;
    transition: background .15s;
  }
  .btn-solid:hover { background: #000; }
  .side-nav { margin-top: 26px; display: flex; flex-direction: column; }
  .side-item {
    display: flex; align-items: center; gap: 12px; padding: 13px 12px; cursor: pointer;
    background: none; border: 0; border-left: 2px solid transparent; text-align: left;
    font-size: 11px; letter-spacing: .13em; text-transform: uppercase; color: var(--muted);
    transition: .15s;
  }
  .side-item:hover { color: var(--ink); }
  .side-item.active { color: var(--accent); border-left-color: var(--accent); background: var(--accent-soft); }
  .side-item .ico { font-size: 14px; width: 16px; text-align: center; }
  aside .foot { margin-top: auto; font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }

  /* Source panel */
  #source-panel {
    flex: 0 0 400px; display: flex; flex-direction: column; min-height: 0;
    border-right: 1px solid var(--line); background: var(--surface);
  }
  .panel-head {
    display: flex; align-items: center; gap: 10px;
    padding: 16px 18px; border-bottom: 1px solid var(--line);
  }
  .panel-head .eyebrow { margin-right: auto; }
  .icon-btn {
    background: none; border: 1px solid transparent; border-radius: 3px; cursor: pointer;
    color: var(--muted); padding: 5px 7px; font-size: 14px; line-height: 1; transition: .15s;
  }
  .icon-btn:hover { color: var(--accent); border-color: var(--line); }

  .editor-wrap { flex: 1; display: flex; min-height: 0; overflow: hidden; }
  #gutter {
    padding: 18px 10px 18px 18px; text-align: right; user-select: none;
    font-family: var(--mono); font-size: 12.5px; line-height: 1.75; color: #C3BAAC;
    overflow: hidden; white-space: pre;
  }
  #code-input {
    flex: 1; border: 0; outline: none; resize: none; background: transparent; color: var(--ink);
    padding: 18px 18px 18px 6px; font-family: var(--mono); font-size: 12.5px; line-height: 1.75;
    overflow-y: auto;
  }
  #code-input::placeholder { color: #B9AF9F; }

  #error-banner {
    display: none; border-top: 1px solid var(--line);
    background: var(--accent-soft); color: #8C3A1C;
    padding: 12px 18px; font-size: 11.5px; font-family: var(--mono); white-space: pre-wrap;
  }
  #error-banner b { letter-spacing: .12em; text-transform: uppercase; font-size: 10px; margin-right: 10px; }

  /* Canvas */
  #canvas-pane { flex: 1; position: relative; min-width: 0; display: flex; flex-direction: column; }
  #preview {
    flex: 1; position: relative; overflow: hidden; margin: 14px 14px 74px;
    border: 1px solid var(--line); background-color: #FAF8F4;
    background-image:
      linear-gradient(45deg, #E9E3D8 25%, transparent 25%),
      linear-gradient(-45deg, #E9E3D8 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #E9E3D8 75%),
      linear-gradient(-45deg, transparent 75%, #E9E3D8 75%);
    background-size: 22px 22px;
    background-position: 0 0, 0 11px, 11px -11px, -11px 0;
    cursor: grab;
  }
  #preview.panning { cursor: grabbing; }
  #preview .canvas-label {
    position: absolute; top: 14px; left: 18px; pointer-events: none; z-index: 1;
    font-size: 10px; letter-spacing: .16em; text-transform: uppercase; color: #BDB3A4;
  }
  /* SVG is resized (not transform-scaled) so it stays sharp at any zoom. */
  #zoom-wrapper { position: absolute; top: 0; left: 0; }
  #zoom-wrapper svg { display: block; }

  /* Floating zoom rail */
  .zoom-rail {
    position: absolute; top: 28px; right: 28px; z-index: 5;
    display: flex; flex-direction: column; align-items: stretch;
    background: var(--surface); border: 1px solid var(--line); border-radius: 3px;
  }
  .zoom-rail button {
    background: none; border: 0; cursor: pointer; color: var(--ink);
    padding: 9px 11px; font-size: 15px; line-height: 1; transition: .15s;
  }
  .zoom-rail button:hover { color: var(--accent); background: var(--accent-soft); }
  #zoom-indicator {
    font-size: 10px; letter-spacing: .1em; color: var(--muted); text-align: center;
    padding: 5px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
  }

  /* Floating export bar */
  .export-bar {
    position: absolute; right: 28px; bottom: 20px; z-index: 5;
    display: flex; align-items: stretch;
    background: var(--surface); border: 1px solid var(--line); border-radius: 3px;
    box-shadow: 0 6px 22px rgba(26,26,26,.07);
  }
  .export-bar .seg { display: flex; align-items: center; gap: 9px; padding: 0 16px; border-right: 1px solid var(--line); }
  .export-bar .seg:last-child { border-right: 0; padding: 0; }
  .export-bar label { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; }
  .export-bar select {
    border: 0; background: none; color: var(--ink); cursor: pointer;
    font-size: 11px; letter-spacing: .1em; text-transform: uppercase; font-weight: 600;
    padding: 14px 0; outline: none;
  }
  #scale-label.disabled { opacity: .35; pointer-events: none; }
  input[type=checkbox] { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; }
  .export-bar .act {
    background: none; border: 0; cursor: pointer; color: var(--ink); padding: 14px 18px;
    font-size: 11px; letter-spacing: .13em; text-transform: uppercase; font-weight: 500; transition: .15s;
  }
  .export-bar .act:hover { color: var(--accent); }
  .export-bar .act.primary { background: var(--ink); color: var(--paper); }
  .export-bar .act.primary:hover { background: var(--accent); color: #fff; }

  /* Status strip */
  footer {
    display: flex; align-items: center; gap: 20px;
    padding: 10px 22px; border-top: 1px solid var(--line); background: var(--surface);
    font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted);
  }
  footer .spacer { flex: 1; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #4E9A5B; display: inline-block; margin-right: 8px; }

  /* Context popup */
  #ctx-popup {
    position: fixed; z-index: 100; background: var(--surface); color: var(--ink);
    border: 1px solid var(--line); border-radius: 3px; box-shadow: 0 14px 40px rgba(26,26,26,.16);
    padding: 14px; display: none; max-width: 258px;
  }
  #ctx-popup h4 {
    margin: 0 0 10px; font-size: 10px; letter-spacing: .16em; text-transform: uppercase;
    color: var(--muted); font-weight: 500;
  }
  #ctx-popup .shape-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
  #ctx-popup .shape-grid button {
    font-size: 10.5px; padding: 8px 4px; background: var(--paper); color: var(--ink);
    border: 1px solid var(--line); border-radius: 2px; cursor: pointer; transition: .15s;
  }
  #ctx-popup .shape-grid button:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
  #ctx-popup .row { display: flex; gap: 7px; align-items: center; margin-top: 10px; }
  #ctx-popup .row button {
    background: var(--paper); color: var(--ink); border: 1px solid var(--line); border-radius: 2px;
    padding: 9px 12px; cursor: pointer; font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase;
  }
  #ctx-popup .row button:hover { border-color: var(--accent); color: var(--accent); }
  #ctx-popup input[type=color] { width: 38px; height: 32px; padding: 0; border: 1px solid var(--line); border-radius: 2px; background: none; cursor: pointer; }

  .toast {
    position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: var(--paper); padding: 12px 20px; border-radius: 2px;
    font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
    opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 200;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
  <header>
    <div class="logo-badge"><img src="logo.png" alt="Scales logo"></div>
    <div class="wordmark">Scales</div>
    <div class="spacer"></div>
    <div class="stamp">Privacy first • Free forever</div>
  </header>

  <main>
    <aside>
      <div class="eyebrow">Project</div>
      <div class="project-title">Untitled Diagram</div>
      <button class="btn-solid" id="new-diagram">New Diagram</button>
      <nav class="side-nav">
        <button class="side-item active" id="nav-editor"><span class="ico">&lt;/&gt;</span> Editor</button>
      </nav>
      <div class="foot">Scales Editorial</div>
    </aside>

    <section id="source-panel">
      <div class="panel-head">
        <span class="eyebrow">Mermaid Source</span>
        <button class="icon-btn" id="copy-code" title="Copy code">⧉</button>
      </div>
      <div class="editor-wrap">
        <div id="gutter">1</div>
        <textarea id="code-input" spellcheck="false" placeholder="Paste your Mermaid code here — or grab it from any AI tool…">graph TD
    A[Architecture] --> B{Scales}
    B -->|Precision| C[Editor]
    B -->|Tactile| D[Preview]
    C --> E[SVG Output]
    D --> E
    E --> F[Professional Clarity]</textarea>
      </div>
      <div id="error-banner"></div>
    </section>

    <section id="canvas-pane">
      <div id="preview">
        <span class="canvas-label">Drafting Canvas</span>
        <div id="zoom-wrapper"></div>
      </div>

      <div class="zoom-rail">
        <button id="zoom-in" title="Zoom in">+</button>
        <span id="zoom-indicator">100%</span>
        <button id="zoom-out" title="Zoom out">−</button>
        <button id="reset-view" title="Fit to view">⤢</button>
      </div>

      <div class="export-bar">
        <div class="seg">
          <span class="eyebrow">Format</span>
          <select id="format-select">
            <option value="png" selected>PNG</option>
            <option value="svg">SVG</option>
          </select>
        </div>
        <div class="seg" id="scale-label">
          <span class="eyebrow">Scale</span>
          <select id="scale-select">
            <option value="1">1x</option>
            <option value="2" selected>2x</option>
            <option value="4">4x</option>
          </select>
        </div>
        <div class="seg">
          <label><input type="checkbox" id="transparent-bg"> <span class="eyebrow">Transparent</span></label>
        </div>
        <div class="seg">
          <button class="act" id="copy-btn">Copy</button>
          <button class="act primary" id="download-btn">Download PNG</button>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <span>Scales Editorial © 2026</span>
    <span class="spacer"></span>
    <span id="node-count"></span>
    <span><span class="dot"></span>Rendering engine online</span>
  </footer>

  <div id="ctx-popup"></div>
  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="panzoom.js"></script>
  <script src="interactions.js"></script>
  <script src="app.js"></script>
</body>
</html>
